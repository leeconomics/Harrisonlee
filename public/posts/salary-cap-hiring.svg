<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ed"/>
      <stop offset="60%" stop-color="#eef2f3"/>
      <stop offset="100%" stop-color="#dde7eb"/>
    </linearGradient>
    <linearGradient id="barrel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c5f7a"/>
      <stop offset="100%" stop-color="#4a7a8c"/>
    </linearGradient>
    <linearGradient id="ammo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9bc8d7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#b4d7e1" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg1)"/>

  <!-- Subtle grid baseline -->
  <line x1="100" y1="500" x2="1100" y2="500" stroke="#2c5f7a" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Field of ammunition (short, uniform) -->
  <g opacity="0.85">
    <rect x="120" y="420" width="14" height="80" fill="url(#ammo)" rx="2"/>
    <rect x="148" y="430" width="14" height="70" fill="url(#ammo)" rx="2"/>
    <rect x="176" y="425" width="14" height="75" fill="url(#ammo)" rx="2"/>
    <rect x="204" y="435" width="14" height="65" fill="url(#ammo)" rx="2"/>
    <rect x="232" y="420" width="14" height="80" fill="url(#ammo)" rx="2"/>
    <rect x="260" y="430" width="14" height="70" fill="url(#ammo)" rx="2"/>
    <rect x="288" y="425" width="14" height="75" fill="url(#ammo)" rx="2"/>
    <rect x="316" y="435" width="14" height="65" fill="url(#ammo)" rx="2"/>
    <rect x="344" y="422" width="14" height="78" fill="url(#ammo)" rx="2"/>

    <!-- BARREL 1 - tall and prominent -->
    <rect x="378" y="240" width="22" height="260" fill="url(#barrel)" rx="3"/>

    <rect x="420" y="430" width="14" height="70" fill="url(#ammo)" rx="2"/>
    <rect x="448" y="425" width="14" height="75" fill="url(#ammo)" rx="2"/>
    <rect x="476" y="435" width="14" height="65" fill="url(#ammo)" rx="2"/>
    <rect x="504" y="420" width="14" height="80" fill="url(#ammo)" rx="2"/>
    <rect x="532" y="430" width="14" height="70" fill="url(#ammo)" rx="2"/>
    <rect x="560" y="425" width="14" height="75" fill="url(#ammo)" rx="2"/>

    <!-- BARREL 2 - tall -->
    <rect x="594" y="200" width="22" height="300" fill="url(#barrel)" rx="3"/>

    <rect x="636" y="425" width="14" height="75" fill="url(#ammo)" rx="2"/>
    <rect x="664" y="435" width="14" height="65" fill="url(#ammo)" rx="2"/>
    <rect x="692" y="420" width="14" height="80" fill="url(#ammo)" rx="2"/>
    <rect x="720" y="430" width="14" height="70" fill="url(#ammo)" rx="2"/>
    <rect x="748" y="422" width="14" height="78" fill="url(#ammo)" rx="2"/>
    <rect x="776" y="425" width="14" height="75" fill="url(#ammo)" rx="2"/>
    <rect x="804" y="435" width="14" height="65" fill="url(#ammo)" rx="2"/>

    <!-- BARREL 3 - tall -->
    <rect x="838" y="270" width="22" height="230" fill="url(#barrel)" rx="3"/>

    <rect x="880" y="430" width="14" height="70" fill="url(#ammo)" rx="2"/>
    <rect x="908" y="420" width="14" height="80" fill="url(#ammo)" rx="2"/>
    <rect x="936" y="435" width="14" height="65" fill="url(#ammo)" rx="2"/>
    <rect x="964" y="425" width="14" height="75" fill="url(#ammo)" rx="2"/>
    <rect x="992" y="430" width="14" height="70" fill="url(#ammo)" rx="2"/>
    <rect x="1020" y="422" width="14" height="78" fill="url(#ammo)" rx="2"/>
    <rect x="1048" y="425" width="14" height="75" fill="url(#ammo)" rx="2"/>
  </g>

  <!-- Subtle wave at bottom -->
  <path d="M 0 560 Q 300 540, 600 560 T 1200 560 L 1200 630 L 0 630 Z" fill="#2c5f7a" fill-opacity="0.06"/>
  <path d="M 0 590 Q 300 575, 600 590 T 1200 590 L 1200 630 L 0 630 Z" fill="#2c5f7a" fill-opacity="0.08"/>
</svg>
