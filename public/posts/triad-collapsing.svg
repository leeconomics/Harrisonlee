<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ed"/>
      <stop offset="60%" stop-color="#eef2f3"/>
      <stop offset="100%" stop-color="#dde7eb"/>
    </linearGradient>
    <linearGradient id="merged" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9bc8d7" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#2c5f7a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0d1f2a" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg5)"/>

  <!-- Three streams entering from left, converging toward center-right -->
  <!-- Stream 1: PM (top) -->
  <path d="M 0 220
           C 150 220, 280 240, 400 280
           C 520 320, 580 340, 650 350"
        stroke="#4a8ba8"
        stroke-width="3"
        fill="none"
        opacity="0.7"
        stroke-linecap="round"/>

  <!-- Stream 2: Designer (middle) -->
  <path d="M 0 340
           C 150 340, 280 345, 400 348
           C 520 350, 580 350, 650 350"
        stroke="#2c5f7a"
        stroke-width="3"
        fill="none"
        opacity="0.8"
        stroke-linecap="round"/>

  <!-- Stream 3: Engineer (bottom) -->
  <path d="M 0 460
           C 150 460, 280 440, 400 410
           C 520 380, 580 360, 650 350"
        stroke="#4a8ba8"
        stroke-width="3"
        fill="none"
        opacity="0.7"
        stroke-linecap="round"/>

  <!-- Convergence point -->
  <circle cx="650" cy="350" r="6" fill="#0d1f2a" opacity="0.4"/>
  <circle cx="650" cy="350" r="14" fill="none" stroke="#2c5f7a" stroke-width="1" opacity="0.3"/>
  <circle cx="650" cy="350" r="26" fill="none" stroke="#2c5f7a" stroke-width="0.5" opacity="0.2"/>

  <!-- Merged outflow - thick and dark, the new archetype -->
  <!-- Outer halo to add weight -->
  <path d="M 650 350
           L 1200 350"
        stroke="#2c5f7a"
        stroke-width="22"
        fill="none"
        opacity="0.2"
        stroke-linecap="round"/>
  <path d="M 650 350
           L 1200 350"
        stroke="#0d1f2a"
        stroke-width="10"
        fill="none"
        opacity="0.9"
        stroke-linecap="round"/>
  <!-- Particles flowing along the merged outflow -->
  <g fill="#9bc8d7" opacity="0.95">
    <circle cx="740" cy="350" r="2.5"/>
    <circle cx="830" cy="350" r="2.5"/>
    <circle cx="920" cy="350" r="2.5"/>
    <circle cx="1010" cy="350" r="2.5"/>
    <circle cx="1100" cy="350" r="2.5"/>
  </g>

  <!-- Faint labels at origin (just dots/markers, no text per voice rules) -->
  <circle cx="20" cy="220" r="4" fill="#4a8ba8" opacity="0.5"/>
  <circle cx="20" cy="340" r="4" fill="#2c5f7a" opacity="0.6"/>
  <circle cx="20" cy="460" r="4" fill="#4a8ba8" opacity="0.5"/>

  <!-- Bottom waves -->
  <path d="M 0 560 Q 300 545, 600 560 T 1200 560 L 1200 630 L 0 630 Z" fill="#2c5f7a" fill-opacity="0.08"/>
  <path d="M 0 595 Q 300 583, 600 595 T 1200 595 L 1200 630 L 0 630 Z" fill="#2c5f7a" fill-opacity="0.1"/>
</svg>
