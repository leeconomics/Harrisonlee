<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ed"/>
      <stop offset="60%" stop-color="#eef2f3"/>
      <stop offset="100%" stop-color="#dde7eb"/>
    </linearGradient>
    <linearGradient id="wave-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2c5f7a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#2c5f7a" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="wave-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a8ba8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4a8ba8" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="merge-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1f2a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0d1f2a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg6)"/>

  <!-- Wave from LEFT (design) - rolling rightward -->
  <path d="M 0 200
           C 100 200, 200 220, 300 250
           C 400 280, 500 310, 600 330
           L 600 500
           L 0 500 Z"
        fill="url(#wave-left)"
        opacity="0.6"/>

  <!-- Wave from RIGHT (engineering) - rolling leftward -->
  <path d="M 1200 200
           C 1100 200, 1000 220, 900 250
           C 800 280, 700 310, 600 330
           L 600 500
           L 1200 500 Z"
        fill="url(#wave-right)"
        opacity="0.6"/>

  <!-- Top sine line from left, curling toward middle -->
  <path d="M 0 220
           C 100 215, 200 230, 300 260
           C 400 290, 500 320, 600 330"
        stroke="#2c5f7a"
        stroke-width="2.5"
        fill="none"
        opacity="0.8"
        stroke-linecap="round"/>

  <!-- Top sine line from right, curling toward middle -->
  <path d="M 1200 220
           C 1100 215, 1000 230, 900 260
           C 800 290, 700 320, 600 330"
        stroke="#4a8ba8"
        stroke-width="2.5"
        fill="none"
        opacity="0.8"
        stroke-linecap="round"/>

  <!-- Merge glow at center -->
  <ellipse cx="600" cy="330" rx="120" ry="40" fill="url(#merge-glow)"/>
  <circle cx="600" cy="330" r="6" fill="#0d1f2a" opacity="0.5"/>
  <circle cx="600" cy="330" r="14" fill="none" stroke="#2c5f7a" stroke-width="1" opacity="0.4"/>
  <circle cx="600" cy="330" r="26" fill="none" stroke="#2c5f7a" stroke-width="0.5" opacity="0.25"/>
  <circle cx="600" cy="330" r="42" fill="none" stroke="#2c5f7a" stroke-width="0.5" opacity="0.15"/>

  <!-- Subtle particles being absorbed inward -->
  <g fill="#2c5f7a" opacity="0.4">
    <circle cx="180" cy="290" r="2"/>
    <circle cx="280" cy="310" r="2.5"/>
    <circle cx="380" cy="320" r="2"/>
    <circle cx="480" cy="328" r="2.5"/>
  </g>
  <g fill="#4a8ba8" opacity="0.4">
    <circle cx="1020" cy="290" r="2"/>
    <circle cx="920" cy="310" r="2.5"/>
    <circle cx="820" cy="320" r="2"/>
    <circle cx="720" cy="328" r="2.5"/>
  </g>

  <!-- Baseline -->
  <line x1="0" y1="500" x2="1200" y2="500" stroke="#2c5f7a" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Bottom waves -->
  <path d="M 0 560 Q 300 545, 600 560 T 1200 560 L 1200 630 L 0 630 Z" fill="#2c5f7a" fill-opacity="0.08"/>
  <path d="M 0 595 Q 300 583, 600 595 T 1200 595 L 1200 630 L 0 630 Z" fill="#2c5f7a" fill-opacity="0.1"/>
</svg>
