<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ed"/>
      <stop offset="60%" stop-color="#eef2f3"/>
      <stop offset="100%" stop-color="#dde7eb"/>
    </linearGradient>
    <linearGradient id="left-mass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2c5f7a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#2c5f7a" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="right-mass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2c5f7a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2c5f7a" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="middle-erode" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9bc8d7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#9bc8d7" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg7)"/>

  <!-- LEFT END - heavy mass, like a thick column -->
  <ellipse cx="220" cy="320" rx="90" ry="180" fill="url(#left-mass)"/>
  <ellipse cx="220" cy="320" rx="60" ry="150" fill="#2c5f7a" opacity="0.3"/>

  <!-- Top curve from left mass arching toward right mass -->
  <path d="M 220 140
           C 350 140, 500 160, 600 180
           C 700 200, 850 220, 980 250"
        stroke="#9bc8d7"
        stroke-width="2"
        fill="none"
        opacity="0.5"
        stroke-dasharray="4 6"/>

  <!-- RIGHT END - heavy mass -->
  <ellipse cx="980" cy="320" rx="90" ry="180" fill="url(#right-mass)"/>
  <ellipse cx="980" cy="320" rx="60" ry="150" fill="#2c5f7a" opacity="0.3"/>

  <!-- MIDDLE - thin, eroding, with breakdown effect -->
  <g opacity="0.7">
    <!-- Light wisps representing the eroding middle -->
    <path d="M 320 280 C 400 280, 480 285, 560 290 C 640 295, 720 295, 800 290 C 860 287, 920 283, 880 280"
          stroke="#9bc8d7"
          stroke-width="3"
          fill="none"
          stroke-linecap="round"
          opacity="0.6"/>
    <path d="M 330 320 C 410 318, 500 325, 580 322 C 660 320, 740 320, 820 320 C 870 320, 880 320, 880 320"
          stroke="#9bc8d7"
          stroke-width="2"
          fill="none"
          stroke-linecap="round"
          opacity="0.5"/>
    <path d="M 340 360 C 420 360, 510 358, 590 360 C 670 362, 750 358, 830 360 C 870 360, 880 360, 880 360"
          stroke="#9bc8d7"
          stroke-width="2"
          fill="none"
          stroke-linecap="round"
          opacity="0.4"/>

    <!-- Particles dispersing/floating away from the middle -->
    <circle cx="450" cy="265" r="2" fill="#9bc8d7" opacity="0.6"/>
    <circle cx="520" cy="245" r="1.5" fill="#9bc8d7" opacity="0.5"/>
    <circle cx="600" cy="225" r="2" fill="#9bc8d7" opacity="0.4"/>
    <circle cx="680" cy="240" r="1.5" fill="#9bc8d7" opacity="0.5"/>
    <circle cx="750" cy="260" r="2" fill="#9bc8d7" opacity="0.6"/>
    <circle cx="500" cy="395" r="2" fill="#9bc8d7" opacity="0.5"/>
    <circle cx="600" cy="410" r="1.5" fill="#9bc8d7" opacity="0.4"/>
    <circle cx="700" cy="395" r="2" fill="#9bc8d7" opacity="0.5"/>
  </g>

  <!-- Bottom curve completing the bookend visual -->
  <path d="M 220 500
           C 350 500, 500 480, 600 460
           C 700 440, 850 420, 980 390"
        stroke="#9bc8d7"
        stroke-width="2"
        fill="none"
        opacity="0.5"
        stroke-dasharray="4 6"/>

  <!-- Subtle markers at the two compounding ends -->
  <circle cx="220" cy="320" r="4" fill="#0d1f2a" opacity="0.7"/>
  <circle cx="980" cy="320" r="4" fill="#0d1f2a" opacity="0.7"/>

  <!-- Bottom waves -->
  <path d="M 0 560 Q 300 545, 600 560 T 1200 560 L 1200 630 L 0 630 Z" fill="#2c5f7a" fill-opacity="0.08"/>
  <path d="M 0 595 Q 300 583, 600 595 T 1200 595 L 1200 630 L 0 630 Z" fill="#2c5f7a" fill-opacity="0.1"/>
</svg>
